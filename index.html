<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>...</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        #img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            pointer-events: none;
        }

        #hidden {
            position: absolute;
            color: #39ff14;
            font-family: monospace;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 0 10px #39ff14;
        }
    </style>
</head>

<body>

    <img src="youbetterstop.png" id="img">

    <div id="hidden">are you sure youre gonna keep going?</div>

    <script>

        let timer = null;

        let targetX = 0;
        let targetY = 0;


        function setRandomPosition() {
            targetX = window.innerWidth * (0.3 + Math.random() * 0.4);
            targetY = window.innerHeight * (0.3 + Math.random() * 0.4);

            const el = document.getElementById("hidden");
            el.style.left = targetX + "px";
            el.style.top = targetY + "px";
        }


        setRandomPosition();

        document.addEventListener("mousemove", function (e) {

            const dist = Math.hypot(e.clientX - targetX, e.clientY - targetY);

            if (dist < 80) {

                if (!timer) {
                    timer = setTimeout(() => {

                        const el = document.getElementById("hidden");
                        el.style.opacity = 1;

                        setTimeout(() => {
                            el.style.opacity = 0;
                            setRandomPosition();
                        }, 1500);

                        timer = null;

                    }, 2000);
                }

            } else {

                clearTimeout(timer);
                timer = null;
                document.getElementById("hidden").style.opacity = 0;
            }

        });

    </script>

</body>

</html>
