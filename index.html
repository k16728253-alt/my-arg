<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>...</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        #img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        #hidden {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #00ff9c;
            font-family: monospace;
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <img src="youbetterstop.png" id="img">

    <div id="hidden">are you sure youre gonna keep going?</div>

    <script>

        let timer = null;

        // 👉 每次載入隨機位置（但限制在中間區域）
        let targetX = window.innerWidth * (0.3 + Math.random() * 0.4);
        let targetY = window.innerHeight * (0.3 + Math.random() * 0.4);

        document.addEventListener("mousemove", function (e) {

            const dist = Math.hypot(e.clientX - targetX, e.clientY - targetY);

            if (dist < 80) {

                if (!timer) {
                    timer = setTimeout(() => {
                        document.getElementById("hidden").style.opacity = 1;
                    }, 2000);
                }

            } else {
                clearTimeout(timer);
                timer = null;
                document.getElementById("hidden").style.opacity = 0;
            }

        });
    </script>

</body>

</html>
